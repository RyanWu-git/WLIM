name: build-windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\IM\ChatAppWpf\ChatAppWpf.csproj

      - name: Publish
        run: dotnet publish .\IM\ChatAppWpf\ChatAppWpf.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatAppWpf-win-x64
          path: IM/ChatAppWpf/bin/Release/net8.0-windows/win-x64/publish/
